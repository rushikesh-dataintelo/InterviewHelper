name: Build Linux Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libgtk-3-0 libnss3 libasound2

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Linux installers (AppImage + deb)
        run: npm run package:linux

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: iviewhelper-linux
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
