name: Build Linux Installer

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install AppImage runtime library (best-effort)
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2 || true

      - name: Install dependencies
        run: npm ci

      - name: Build Linux installer (AppImage)
        env:
          # AppImage packaging runs appimagetool, which needs FUSE.
          # libfuse2 isn't guaranteed on the runner, so extract-and-run instead.
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: npm run package:linux

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: iviewhelper-linux
          path: dist/*.AppImage
          if-no-files-found: error
