appId: com.iviewhelper.app
productName: iViewHelper
directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.env,.env.*,.npmrc}'
  - '!{tsconfig.json,tsconfig.*.json}'

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - universal
  darkModeSupport: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  extendInfo:
    LSUIElement: true

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: '${name}-${version}.${ext}'
  signAndEditExecutable: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  maintainer: DataIntelo <tech@dataintelo.com>
  synopsis: Stealth AI meeting assistant
  artifactName: '${name}-${version}.${ext}'

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
